version: '3.8'

services:
  logger-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: java_logger_app
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data # save .db file on computer
      - ../.env:/app/.env # Read .env file
    environment:
      # Decide where database will end up. 
      - DATABASE_URL=jdbc:sqlite:/app/data/logs.db
    restart: always